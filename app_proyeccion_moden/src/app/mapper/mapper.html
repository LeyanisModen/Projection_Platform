<main #mapperWrapper id="mapperWrapper" tabindex="0" (mousemove)="this.move($event)" (mouseup)="this.mouseupHandler()"
    (mousedown)="this.mousedownHandler($event)" (blur)="this.setInactiveImmediately()">

    <div #sourceIframe id="sourceIframe" class="sourceCorrect" (ontransitionend)="transitionEndHandler()"
        draggable="false">
        <div #result id="result">
            <img #correctedVideo id="correctedVideo" width="100%" height="100%"
                [style.display]="imageUrl ? 'block' : 'none'" />
            @if (!imageUrl) {
            <div class="no-image-text">Imagen/Plano no asignado</div>
            }
            @if (checkOverlay === 'success') {
            <div class="mapper-check-overlay mapper-check-ok" role="status" aria-label="Check correcto">
                <div class="mapper-check-icon">&#10003;</div>
            </div>
            } @else if (checkOverlay === 'error') {
            <div class="mapper-check-overlay mapper-check-ko" role="alert" aria-label="Check fallido">
                <div class="mapper-check-icon">&#10007;</div>
                <div class="mapper-check-hint">Pulsa ESPACIO para desbloquear</div>
            </div>
            } @else if (checkOverlay === 'no_camera') {
            <div class="mapper-check-overlay mapper-check-ko" role="alert" aria-label="Cámara no disponible">
                <svg class="mapper-check-icon-svg" viewBox="0 0 100 100" aria-hidden="true">
                    <rect x="20" y="32" width="60" height="44" rx="5" fill="none" stroke="currentColor"
                        stroke-width="7" />
                    <rect x="38" y="25" width="24" height="10" fill="currentColor" />
                    <circle cx="50" cy="55" r="12" fill="none" stroke="currentColor" stroke-width="7" />
                    <line x1="18" y1="20" x2="82" y2="84" stroke="currentColor" stroke-width="10"
                        stroke-linecap="round" />
                </svg>
                <div class="mapper-check-hint">Cámara no disponible<br>Pulsa ESPACIO para continuar</div>
            </div>
            }
        </div>

    </div>
    <div #markertl id="marker0" class="corner tl"></div>
    <div #markertr id="marker2" class="corner tr"></div>
    <div #markerbl id="marker4" class="corner bl"></div>
    <div #markerbr id="marker6" class="corner br"></div>
    <div #buttonsContainer id="buttonsContainer" class="sourceCorrect" style="display: none;"></div>

    <div #line1 class="line" id="line1"></div>
    <div #line2 class="line" id="line2"></div>
    <div #line3 class="line" id="line3"></div>
    <div #line4 class="line" id="line4"></div>

    @if (mesaId && calibrating) {
    <!-- Auto-save active, manual button removed -->
    <div class="calibration-controls" style="display: none;">
    </div>
    }

</main>
